<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>F1 REALISTIC 3D | Grand Prix Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Orbitron', 'Segoe UI', 'Rajdhani', monospace;
            touch-action: none;
        }
        /* HUD overlay - 3D game with on-screen buttons */
        #hud {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 5px black;
        }
        .telemetry-panel {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 8px 20px;
            margin-bottom: 15px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            border-left: 4px solid #e10600;
            font-family: monospace;
            pointer-events: none;
        }
        .telemetry-item {
            text-align: center;
            color: #ffdd99;
        }
        .telemetry-label {
            font-size: 10px;
            letter-spacing: 1px;
        }
        .telemetry-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffaa44;
        }
        .button-panel {
            display: flex;
            gap: 18px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 60px;
            pointer-events: auto;
        }
        button {
            background: radial-gradient(circle at 30% 20%, #2a2e3c, #12141f);
            border: none;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 10px 28px;
            min-width: 100px;
            border-radius: 60px;
            color: #ffdca8;
            box-shadow: 0 5px 0 #03060c;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
            letter-spacing: 1px;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #03060c;
        }
        .restart-btn {
            background: radial-gradient(circle at 30% 20%, #5a2a2a, #2f1010);
            color: #ffaa99;
        }
        .boost-btn {
            background: radial-gradient(circle at 30% 20%, #1e4a2e, #0a2a18);
            color: #aaffcc;
        }
        .status-text {
            background: rgba(0,0,0,0.7);
            padding: 5px 18px;
            border-radius: 40px;
            margin-top: 12px;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
        }
        @media (max-width: 700px) {
            button { padding: 6px 16px; font-size: 1rem; min-width: 70px; }
            .telemetry-value { font-size: 16px; }
            .telemetry-panel { gap: 12px; padding: 5px 12px; }
        }
        #instructions {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #ccc;
            pointer-events: none;
            font-family: monospace;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="telemetry-panel">
            <div class="telemetry-item"><div class="telemetry-label">SPEED</div><div class="telemetry-value" id="speedDisplay">0</div><div style="font-size:9px;">km/h</div></div>
            <div class="telemetry-item"><div class="telemetry-label">RPM</div><div class="telemetry-value" id="rpmDisplay">0</div><div style="font-size:9px;">x1000</div></div>
            <div class="telemetry-item"><div class="telemetry-label">GEAR</div><div class="telemetry-value" id="gearDisplay">1</div></div>
            <div class="telemetry-item"><div class="telemetry-label">LAP</div><div class="telemetry-value" id="lapDisplay">0/3</div></div>
            <div class="telemetry-item"><div class="telemetry-label">SCORE</div><div class="telemetry-value" id="scoreDisplay">0</div></div>
        </div>
        <div class="button-panel">
            <button id="leftBtn">◀ LEFT</button>
            <button id="rightBtn">RIGHT ▶</button>
            <button id="boostBtn" class="boost-btn">⚡ BOOST</button>
            <button id="restartBtn" class="restart-btn">⟳ RESTART</button>
        </div>
        <div class="status-text" id="raceStatus">🏎️ 3D GRAND PRIX | OVERTAKE & WIN 🏁</div>
    </div>
    <div id="instructions">🎮 LEFT/RIGHT | BOOST (limited)</div>

    <!-- Import Three.js core and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- setup scene, camera, renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
        
        // Camera: behind the car (chase view)
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2.8, -7);
        camera.lookAt(0, 0.5, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // CSS2DRenderer for floating labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Lighting ---
        // Ambient
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        // Main directional light (sun)
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        sunLight.position.set(5, 10, 3);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        scene.add(sunLight);
        // Fill light from below
        const fillLight = new THREE.PointLight(0x4466cc, 0.4);
        fillLight.position.set(0, -1, 2);
        scene.add(fillLight);
        // Back rim light
        const rimLight = new THREE.PointLight(0xffaa66, 0.5);
        rimLight.position.set(-2, 2, -4);
        scene.add(rimLight);
        
        // --- Track: a long curved road with markers ---
        const trackLength = 200;
        const trackWidth = 6;
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x1a1f2a, roughness: 0.7, metalness: 0.1 });
        const road = new THREE.Mesh(new THREE.PlaneGeometry(trackWidth, trackLength), roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.y = -0.05;
        road.receiveShadow = true;
        scene.add(road);
        
        // Lane markings
        const lineMat = new THREE.MeshStandardMaterial({ color: 0xffcc55, emissive: 0x442200 });
        for (let i = -1.5; i <= 1.5; i+=1.5) {
            const lineStrip = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.05, trackLength), lineMat);
            lineStrip.position.set(i, 0, 0);
            lineStrip.receiveShadow = true;
            scene.add(lineStrip);
        }
        
        // Dashed center line (animated later)
        const dashMat = new THREE.MeshStandardMaterial({ color: 0xffaa66 });
        const dashes = [];
        for (let z = -trackLength/2 + 1; z < trackLength/2; z += 1.8) {
            const dash = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.08, 0.8), dashMat);
            dash.position.set(0, 0.02, z);
            dash.castShadow = true;
            scene.add(dash);
            dashes.push(dash);
        }
        
        // Roadside kerbs & grass
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x2c5a2a });
        const leftGrass = new THREE.Mesh(new THREE.PlaneGeometry(4, trackLength), grassMat);
        leftGrass.rotation.x = -Math.PI/2;
        leftGrass.position.set(-4.2, -0.08, 0);
        scene.add(leftGrass);
        const rightGrass = new THREE.Mesh(new THREE.PlaneGeometry(4, trackLength), grassMat);
        rightGrass.rotation.x = -Math.PI/2;
        rightGrass.position.set(4.2, -0.08, 0);
        scene.add(rightGrass);
        
        // Trees along track (simple)
        const treeMat = new THREE.MeshStandardMaterial({ color: 0x5c9e3a });
        for (let z = -90; z <= 90; z+=12) {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1.2, 4), treeMat);
            trunk.position.set(-5.2, 0, z);
            trunk.castShadow = true;
            scene.add(trunk);
            const trunk2 = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1.2, 4), treeMat);
            trunk2.position.set(5.2, 0, z);
            trunk2.castShadow = true;
            scene.add(trunk2);
        }
        
        // --- F1 Car Model (custom group) ---
        const carGroup = new THREE.Group();
        // Body
        const bodyGeo = new THREE.BoxGeometry(0.9, 0.35, 1.8);
        const bodyMatRed = new THREE.MeshStandardMaterial({ color: 0xE10600, roughness: 0.2, metalness: 0.85 });
        const body = new THREE.Mesh(bodyGeo, bodyMatRed);
        body.castShadow = true;
        body.receiveShadow = true;
        body.position.y = 0.1;
        carGroup.add(body);
        // Cockpit
        const cockpitGeo = new THREE.BoxGeometry(0.7, 0.2, 0.9);
        const cockpitMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9 });
        const cockpit = new THREE.Mesh(cockpitGeo, cockpitMat);
        cockpit.position.set(0, 0.28, -0.2);
        cockpit.castShadow = true;
        carGroup.add(cockpit);
        // Halo
        const haloMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, metalness: 0.95 });
        const haloBar = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 0.9), haloMat);
        haloBar.position.set(0, 0.48, -0.1);
        carGroup.add(haloBar);
        // Wheels
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
        const positions = [[-0.65, 0.05, 0.7], [0.65, 0.05, 0.7], [-0.65, 0.05, -0.7], [0.65, 0.05, -0.7]];
        positions.forEach(pos => {
            const wheelGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.5, 24);
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI/2;
            wheel.position.set(pos[0], pos[1], pos[2]);
            wheel.castShadow = true;
            carGroup.add(wheel);
        });
        // Rear wing
        const wingMat = new THREE.MeshStandardMaterial({ color: 0xccaa77 });
        const wing = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.12, 0.25), wingMat);
        wing.position.set(0, 0.32, -0.95);
        carGroup.add(wing);
        scene.add(carGroup);
        
        // --- Opponent cars (AI) ---
        const opponents = [];
        function createOpponentCar(x, z, colorHex) {
            const group = new THREE.Group();
            const col = colorHex || 0x3a6ea5;
            const mat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.4 });
            const bodyO = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.33, 1.7), mat);
            bodyO.castShadow = true;
            group.add(bodyO);
            const wheelMatO = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const offs = [[-0.6, 0.05, 0.65], [0.6, 0.05, 0.65], [-0.6, 0.05, -0.65], [0.6, 0.05, -0.65]];
            offs.forEach(pos => {
                const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.45, 16), wheelMatO);
                wheel.rotation.z = Math.PI/2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                group.add(wheel);
            });
            group.position.set(x, 0.1, z);
            scene.add(group);
            return group;
        }
        
        // Spawn 5 opponents ahead
        for (let i = 0; i < 6; i++) {
            const laneX = (Math.random() - 0.5) * 3.2;
            const zPos = -15 - i * 8;
            const carObj = createOpponentCar(laneX, zPos, 0x4a7db4);
            opponents.push({ obj: carObj, z: zPos, x: laneX, speed: 1.8 + Math.random() * 1.2, passed: false });
        }
        
        // --- Floating labels for opponents (CSS2D) ---
        const labelDiv = (text, color) => {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '14px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px black';
            div.style.background = 'rgba(0,0,0,0.6)';
            div.style.padding = '2px 8px';
            div.style.borderRadius = '20px';
            div.style.borderLeft = `3px solid ${color}`;
            div.style.fontFamily = 'monospace';
            return new CSS2DObject(div);
        };
        
        const oppLabels = [];
        opponents.forEach((opp, idx) => {
            const lbl = labelDiv(`RIVAL ${idx+1}`, '#ffaa77');
            lbl.position.copy(opp.obj.position);
            lbl.position.y += 0.9;
            scene.add(lbl);
            oppLabels.push(lbl);
        });
        
        // --- Game State ---
        let gameActive = true;
        let gameWin = false;
        let speed = 110;    // km/h
        let targetSpeed = 110;
        let score = 0;
        let currentLap = 0;
        let lapDistance = 0;
        const lapLength = 65;  // meters (track length units)
        let gear = 2;
        let rpm = 5500;
        let boostAmount = 100;  // boost energy %
        let boosting = false;
        
        // Car lateral movement
        let targetLaneX = 0;
        let currentLaneX = 0;
        const laneStep = 1.5;
        const maxLane = 2.2;
        
        // UI elements
        const speedElem = document.getElementById('speedDisplay');
        const rpmElem = document.getElementById('rpmDisplay');
        const gearElem = document.getElementById('gearDisplay');
        const lapElem = document.getElementById('lapDisplay');
        const scoreElem = document.getElementById('scoreDisplay');
        const statusElem = document.getElementById('raceStatus');
        
        // Helper updates
        function updateUI() {
            speedElem.innerText = Math.floor(speed);
            let rpmK = Math.floor(rpm / 1000);
            rpmElem.innerText = rpmK;
            gearElem.innerText = gear;
            lapElem.innerText = `${currentLap}/3`;
            scoreElem.innerText = Math.floor(score);
        }
        
        // Realistic physics update
        function updatePhysics(deltaTime) {
            if (!gameActive) return;
            // boost logic
            let boostFactor = 1.0;
            if (boosting && boostAmount > 5 && gameActive) {
                boostFactor = 1.45;
                boostAmount -= deltaTime * 18;
                if (boostAmount < 0) boostAmount = 0;
            } else {
                boosting = false;
                // regenerate boost slowly
                boostAmount += deltaTime * 6;
                if (boostAmount > 100) boostAmount = 100;
            }
            // target speed based on score and boost
            let perf = 1 + (score / 800);
            perf = Math.min(perf, 1.35);
            let rawTarget = 130 + (score / 14);
            rawTarget = Math.min(rawTarget, 340);
            targetSpeed = rawTarget * perf * (boostFactor);
            // acceleration inertia
            let accel = (targetSpeed - speed) * 0.08;
            speed += accel;
            speed = Math.max(75, Math.min(speed, 370));
            
            // Gear simulation
            let newGear = gear;
            if (speed > 210 && gear < 5) newGear = 5;
            else if (speed > 145 && gear < 4) newGear = 4;
            else if (speed > 95 && gear < 3) newGear = 3;
            else if (speed > 60 && gear < 2) newGear = 2;
            else if (speed < 55 && gear > 2) newGear = 2;
            if (newGear !== gear) {
                gear = newGear;
                rpm = 5200;
            }
            rpm = Math.min(12500, rpm + (speed * 35 * deltaTime));
            if (rpm > 11500) rpm = 10500;
            
            // Lap progression
            let deltaZ = speed * deltaTime * 0.055;
            lapDistance += deltaZ;
            if (lapDistance >= lapLength) {
                lapDistance -= lapLength;
                currentLap++;
                if (currentLap >= 3) {
                    gameActive = false;
                    gameWin = true;
                    statusElem.innerText = "🏆 YOU ARE F1 WORLD CHAMPION! 🏆";
                } else {
                    score += 180;
                    statusElem.innerText = `✔️ LAP ${currentLap} COMPLETE +180 PTS`;
                    setTimeout(() => { if(gameActive) statusElem.innerText = "🏁 PUSH FOR MORE OVERTAKES 🏁"; }, 1800);
                }
                updateUI();
            }
            // update camera slight shake based on speed
            camera.position.x += (currentLaneX * 0.12 - camera.position.x) * 0.1;
            camera.position.z = -6 + (speed / 280) * 0.8;
            camera.lookAt(currentLaneX * 0.8, 0.2, lapDistance + 5);
        }
        
        // Opponent movement and collision + overtake
        function updateOpponents(deltaTime) {
            const playerZ = lapDistance;
            const playerX = currentLaneX;
            for (let i = 0; i < opponents.length; i++) {
                const opp = opponents[i];
                let oppSpeed = 1.4 + (score / 900);
                oppSpeed = Math.min(oppSpeed, 3.0);
                opp.z += (speed * deltaTime * 0.045) * (0.85 + (opp.speed * 0.1));
                // reposition if far ahead or behind
                if (opp.z > playerZ + 12) {
                    opp.z = playerZ - 18 - Math.random() * 8;
                    opp.x = (Math.random() - 0.5) * 3.4;
                    opp.passed = false;
                    opp.obj.position.set(opp.x, 0.1, opp.z);
                } else if (opp.z < playerZ - 20) {
                    opp.z = playerZ + 10;
                    opp.x = (Math.random() - 0.5) * 3.4;
                    opp.passed = false;
                    opp.obj.position.set(opp.x, 0.1, opp.z);
                }
                opp.obj.position.set(opp.x, 0.1, opp.z);
                if (oppLabels[i]) {
                    oppLabels[i].position.set(opp.x, 0.9, opp.z);
                }
                // Collision detection (distance)
                const dx = playerX - opp.x;
                const dz = playerZ - opp.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if (dist < 1.0 && gameActive) {
                    gameActive = false;
                    gameWin = false;
                    statusElem.innerText = "💥 CRASH! GAME OVER. PRESS RESTART 💥";
                }
                // Overtake: opponent behind and passed
                if (!opp.passed && opp.z < playerZ - 0.8 && opp.z > playerZ - 3.5 && Math.abs(dx) < 1.2) {
                    opp.passed = true;
                    if (gameActive) {
                        score += 45;
                        updateUI();
                        statusElem.innerText = "🏁 OVERTAKE! +45 PTS 🏁";
                        setTimeout(() => { if(gameActive) statusElem.innerText = "🔥 KEEP RACING 🔥"; }, 1000);
                    }
                }
            }
        }
        
        // Animate road dashes (movement)
        let dashOffset = 0;
        function animateRoadDetails(deltaTime) {
            dashOffset += speed * deltaTime * 0.12;
            dashes.forEach((dash, idx) => {
                let newZ = (idx * 1.8 - trackLength/2 + dashOffset) % trackLength;
                if (newZ > trackLength/2) newZ -= trackLength;
                dash.position.z = newZ;
            });
        }
        
        // Car steering animation
        function updateCarPosition(deltaTime) {
            // smooth lane change
            currentLaneX += (targetLaneX - currentLaneX) * 0.25;
            currentLaneX = Math.min(maxLane, Math.max(-maxLane, currentLaneX));
            carGroup.position.x = currentLaneX;
            carGroup.position.z = lapDistance;
            // slight tilt
            carGroup.rotation.z = (currentLaneX * 0.12);
            carGroup.rotation.x = Math.sin(Date.now() * 0.015) * 0.02;
        }
        
        // Score / UI periodic update
        let lastScoreUpdate = 0;
        
        // --- Controls ---
        function moveLeft() {
            if (!gameActive) return;
            targetLaneX = Math.max(-maxLane, targetLaneX - laneStep);
        }
        function moveRight() {
            if (!gameActive) return;
            targetLaneX = Math.min(maxLane, targetLaneX + laneStep);
        }
        function useBoost() {
            if (!gameActive) return;
            if (boostAmount >= 15) {
                boosting = true;
                statusElem.innerText = "⚡ ERS BOOST ACTIVE! ⚡";
                setTimeout(() => { if(gameActive && boosting) statusElem.innerText = "🏎️ PUSH LIMITS 🏎️"; }, 800);
            } else {
                statusElem.innerText = "⚠️ BOOST ENERGY LOW ⚠️";
            }
        }
        function restartGame() {
            gameActive = true;
            gameWin = false;
            speed = 120;
            targetSpeed = 120;
            score = 0;
            currentLap = 0;
            lapDistance = 0;
            boostAmount = 100;
            boosting = false;
            targetLaneX = 0;
            currentLaneX = 0;
            gear = 2;
            rpm = 5000;
            // reset opponents positions
            opponents.forEach((opp, idx) => {
                opp.z = -12 - idx * 7;
                opp.x = (Math.random() - 0.5) * 3.2;
                opp.passed = false;
                opp.obj.position.set(opp.x, 0.1, opp.z);
                if (oppLabels[idx]) oppLabels[idx].position.set(opp.x, 0.9, opp.z);
            });
            updateUI();
            statusElem.innerText = "🏁 RACE RESTARTED! 3 LAPS TO VICTORY 🏁";
            camera.position.set(0, 2.5, -6.5);
        }
        
        // Attach event listeners
        document.getElementById('leftBtn').addEventListener('click', (e) => { e.preventDefault(); moveLeft(); });
        document.getElementById('rightBtn').addEventListener('click', (e) => { e.preventDefault(); moveRight(); });
        document.getElementById('boostBtn').addEventListener('click', (e) => { e.preventDefault(); useBoost(); });
        document.getElementById('restartBtn').addEventListener('click', (e) => { e.preventDefault(); restartGame(); });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
            if (e.key === ' ' || e.key === 'Shift') { e.preventDefault(); useBoost(); }
            if (e.key === 'r') restartGame();
        });
        
        // Touch handling for mobile buttons is built-in
        
        // --- Animation Loop ---
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let dt = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            if (dt < 0.008) dt = 0.016;
            
            if (gameActive) {
                updatePhysics(dt);
                updateOpponents(dt);
                updateCarPosition(dt);
                animateRoadDetails(dt);
                updateUI();
                // show boost on HUD via telemetry feeling (update boost display optionally)
                if (boostAmount < 25 && gameActive) {
                    // visual hint
                    document.getElementById('boostBtn').style.opacity = boostAmount<15?'0.7':'1';
                } else {
                    document.getElementById('boostBtn').style.opacity = '1';
                }
            } else {
                // slight idle animation
                carGroup.rotation.z = Math.sin(Date.now() * 0.01) * 0.05;
            }
            
            // Animate sun light direction
            sunLight.position.x = 5 + Math.sin(Date.now() * 0.0005) * 1;
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // initial reset
        restartGame();
        animate();
        
        // handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // small starfield effect
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 800;
        const starPos = [];
        for (let i = 0; i < starCount; i++) {
            starPos.push((Math.random() - 0.5) * 400);
            starPos.push((Math.random() - 0.5) * 150);
            starPos.push((Math.random() - 0.5) * 100 - 50);
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 });
        const stars = new THREE.Points(starGeometry, starMat);
        scene.add(stars);
    </script>
</body>
</html>
