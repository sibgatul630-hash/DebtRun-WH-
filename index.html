<!DOCTYPE html>
<html>
<head>
  <title>F1 Mini Game</title>
  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    #track {
      position: relative;
      width: 300px;
      height: 500px;
      margin: 20px auto;
      background: #222;
      overflow: hidden;
      border: 2px solid red;
    }

    #car {
      position: absolute;
      bottom: 20px;
      left: 130px;
      width: 40px;
      height: 70px;
      background: red;
      border-radius: 10px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
    }
  </style>
</head>
<body>

<h2>🏎️ F1 Mini Game</h2>

<div id="track">
  <div id="car"></div>
</div>

<button onclick="moveLeft()">⬅ Left</button>
<button onclick="moveRight()">Right ➡</button>

<script>
  let car = document.getElementById("car");
  let position = 130;

  function moveLeft() {
    if (position > 0) {
      position -= 20;
      car.style.left = position + "px";
    }
  }

  function moveRight() {
    if (position < 260) {
      position += 20;
      car.style.left = position + "px";
    }
  }
</script>

</body>
</html>
