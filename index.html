<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>F1 REALISTIC 3D | Chase Camera | Grand Prix</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Orbitron', 'Segoe UI', 'Rajdhani', monospace;
            touch-action: none;
        }
        #hud {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 5px black;
        }
        .telemetry-panel {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 8px 20px;
            margin-bottom: 15px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            border-left: 4px solid #e10600;
            font-family: monospace;
            pointer-events: none;
        }
        .telemetry-item {
            text-align: center;
            color: #ffdd99;
        }
        .telemetry-label {
            font-size: 10px;
            letter-spacing: 1px;
        }
        .telemetry-value {
            font-size: 22px;
            font-weight: bold;
            color: #ffaa44;
        }
        .button-panel {
            display: flex;
            gap: 18px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 60px;
            pointer-events: auto;
        }
        button {
            background: radial-gradient(circle at 30% 20%, #2a2e3c, #12141f);
            border: none;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 10px 28px;
            min-width: 100px;
            border-radius: 60px;
            color: #ffdca8;
            box-shadow: 0 5px 0 #03060c;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
            letter-spacing: 1px;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #03060c;
        }
        .restart-btn {
            background: radial-gradient(circle at 30% 20%, #5a2a2a, #2f1010);
            color: #ffaa99;
        }
        .boost-btn {
            background: radial-gradient(circle at 30% 20%, #1e4a2e, #0a2a18);
            color: #aaffcc;
        }
        .status-text {
            background: rgba(0,0,0,0.7);
            padding: 5px 18px;
            border-radius: 40px;
            margin-top: 12px;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
        }
        @media (max-width: 700px) {
            button { padding: 6px 16px; font-size: 1rem; min-width: 70px; }
            .telemetry-value { font-size: 16px; }
            .telemetry-panel { gap: 12px; padding: 5px 12px; }
        }
        #instructions {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #ccc;
            pointer-events: none;
            font-family: monospace;
            z-index: 10;
        }
        .boost-bar {
            position: absolute;
            top: 80px;
            left: 20px;
            width: 120px;
            height: 12px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid gold;
            pointer-events: none;
            z-index: 10;
        }
        .boost-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            border-radius: 10px;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="telemetry-panel">
            <div class="telemetry-item"><div class="telemetry-label">SPEED</div><div class="telemetry-value" id="speedDisplay">0</div><div style="font-size:9px;">km/h</div></div>
            <div class="telemetry-item"><div class="telemetry-label">RPM</div><div class="telemetry-value" id="rpmDisplay">0</div><div style="font-size:9px;">x1000</div></div>
            <div class="telemetry-item"><div class="telemetry-label">GEAR</div><div class="telemetry-value" id="gearDisplay">1</div></div>
            <div class="telemetry-item"><div class="telemetry-label">LAP</div><div class="telemetry-value" id="lapDisplay">0/3</div></div>
            <div class="telemetry-item"><div class="telemetry-label">SCORE</div><div class="telemetry-value" id="scoreDisplay">0</div></div>
        </div>
        <div class="button-panel">
            <button id="leftBtn">◀ LEFT</button>
            <button id="rightBtn">RIGHT ▶</button>
            <button id="boostBtn" class="boost-btn">⚡ BOOST</button>
            <button id="restartBtn" class="restart-btn">⟳ RESTART</button>
        </div>
        <div class="status-text" id="raceStatus">🏎️ 3D GRAND PRIX | CHASE CAMERA ACTIVE 🏁</div>
    </div>
    <div class="boost-bar">
        <div class="boost-fill" id="boostFill" style="width: 100%"></div>
    </div>
    <div id="instructions">🎮 LEFT/RIGHT | BOOST (ERS) | FOLLOW CAM</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- setup scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.006);
        
        // Camera: DYNAMIC CHASE CAMERA that follows the car!
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // CSS2DRenderer for floating labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.3);
        sunLight.position.set(5, 12, 4);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        scene.add(sunLight);
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(0, -1, 2);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0xffaa66, 0.6);
        rimLight.position.set(-2, 2, -4);
        scene.add(rimLight);
        
        // --- Track System (Infinite scrolling illusion) ---
        const trackLength = 300;
        const trackWidth = 6;
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x181e2c, roughness: 0.7, metalness: 0.1 });
        const road = new THREE.Mesh(new THREE.PlaneGeometry(trackWidth, trackLength), roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.y = -0.05;
        road.receiveShadow = true;
        scene.add(road);
        
        // Lane markings (solid lines)
        const lineMat = new THREE.MeshStandardMaterial({ color: 0xffcc55, emissive: 0x442200 });
        for (let i = -1.8; i <= 1.8; i+=1.8) {
            const lineStrip = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.05, trackLength), lineMat);
            lineStrip.position.set(i, 0, 0);
            lineStrip.receiveShadow = true;
            scene.add(lineStrip);
        }
        
        // Dashed center line (animated)
        const dashMat = new THREE.MeshStandardMaterial({ color: 0xffaa66 });
        const dashes = [];
        for (let z = -trackLength/2 + 1; z < trackLength/2; z += 1.6) {
            const dash = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.08, 0.7), dashMat);
            dash.position.set(0, 0.02, z);
            dash.castShadow = true;
            scene.add(dash);
            dashes.push(dash);
        }
        
        // Roadside grass & kerbs
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x2c5a2a });
        const leftGrass = new THREE.Mesh(new THREE.PlaneGeometry(4.5, trackLength), grassMat);
        leftGrass.rotation.x = -Math.PI/2;
        leftGrass.position.set(-4.5, -0.08, 0);
        scene.add(leftGrass);
        const rightGrass = new THREE.Mesh(new THREE.PlaneGeometry(4.5, trackLength), grassMat);
        rightGrass.rotation.x = -Math.PI/2;
        rightGrass.position.set(4.5, -0.08, 0);
        scene.add(rightGrass);
        
        // Trees
        const treeMat = new THREE.MeshStandardMaterial({ color: 0x5c9e3a });
        for (let z = -140; z <= 140; z+=14) {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.45, 1.4, 4), treeMat);
            trunk.position.set(-5.8, 0, z);
            trunk.castShadow = true;
            scene.add(trunk);
            const trunk2 = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.45, 1.4, 4), treeMat);
            trunk2.position.set(5.8, 0, z);
            trunk2.castShadow = true;
            scene.add(trunk2);
        }
        
        // --- F1 Car Model (detailed) ---
        const carGroup = new THREE.Group();
        const bodyMatRed = new THREE.MeshStandardMaterial({ color: 0xE10600, roughness: 0.2, metalness: 0.9 });
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.38, 1.85), bodyMatRed);
        body.castShadow = true;
        body.position.y = 0.1;
        carGroup.add(body);
        
        const cockpitMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9 });
        const cockpit = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.22, 0.95), cockpitMat);
        cockpit.position.set(0, 0.3, -0.2);
        cockpit.castShadow = true;
        carGroup.add(cockpit);
        
        const haloMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, metalness: 0.95 });
        const haloBar = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 0.95), haloMat);
        haloBar.position.set(0, 0.5, -0.1);
        carGroup.add(haloBar);
        
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
        const wheelPos = [[-0.7, 0.08, 0.75], [0.7, 0.08, 0.75], [-0.7, 0.08, -0.75], [0.7, 0.08, -0.75]];
        wheelPos.forEach(pos => {
            const wheelGeo = new THREE.CylinderGeometry(0.34, 0.34, 0.52, 24);
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI/2;
            wheel.position.set(pos[0], pos[1], pos[2]);
            wheel.castShadow = true;
            carGroup.add(wheel);
        });
        
        const wingMat = new THREE.MeshStandardMaterial({ color: 0xccaa77 });
        const wing = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.12, 0.28), wingMat);
        wing.position.set(0, 0.34, -1.0);
        carGroup.add(wing);
        scene.add(carGroup);
        
        // --- Opponent Cars ---
        const opponents = [];
        function createOpponentCar(x, z, colorHex) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.4, metalness: 0.6 });
            const bodyO = new THREE.Mesh(new THREE.BoxGeometry(0.88, 0.35, 1.75), mat);
            bodyO.castShadow = true;
            group.add(bodyO);
            const wheelMatO = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const offs = [[-0.62, 0.08, 0.68], [0.62, 0.08, 0.68], [-0.62, 0.08, -0.68], [0.62, 0.08, -0.68]];
            offs.forEach(pos => {
                const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.31, 0.31, 0.48, 16), wheelMatO);
                wheel.rotation.z = Math.PI/2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                group.add(wheel);
            });
            group.position.set(x, 0.1, z);
            scene.add(group);
            return group;
        }
        
        // Spawn opponents
        for (let i = 0; i < 7; i++) {
            const laneX = (Math.random() - 0.5) * 3.4;
            const zPos = -20 - i * 9;
            const carObj = createOpponentCar(laneX, zPos, 0x4a7db4);
            opponents.push({ obj: carObj, z: zPos, x: laneX, baseSpeed: 1.6 + Math.random() * 1.3, passed: false });
        }
        
        // CSS2D labels for opponents
        const oppLabels = [];
        opponents.forEach((opp, idx) => {
            const div = document.createElement('div');
            div.textContent = `RIVAL ${idx+1}`;
            div.style.color = '#ffaa77';
            div.style.fontSize = '12px';
            div.style.fontWeight = 'bold';
            div.style.background = 'rgba(0,0,0,0.6)';
            div.style.padding = '2px 8px';
            div.style.borderRadius = '20px';
            div.style.borderLeft = '2px solid #ff5500';
            const lbl = new CSS2DObject(div);
            lbl.position.set(opp.x, 0.9, opp.z);
            scene.add(lbl);
            oppLabels.push(lbl);
        });
        
        // --- Game State ---
        let gameActive = true;
        let gameWin = false;
        let speed = 125;        // km/h
        let targetSpeed = 125;
        let score = 0;
        let currentLap = 0;
        let lapDistance = 0;
        const lapLength = 70;    // meters
        let gear = 2;
        let rpm = 5200;
        let boostAmount = 100;
        let boosting = false;
        
        // Car lateral movement
        let targetLaneX = 0;
        let currentLaneX = 0;
        const laneStep = 1.45;
        const maxLane = 2.35;
        
        // Camera offset (chase camera relative to car)
        let cameraOffset = new THREE.Vector3(0, 1.8, -5.2);
        let cameraSmoothing = 0.12;
        
        // UI Elements
        const speedElem = document.getElementById('speedDisplay');
        const rpmElem = document.getElementById('rpmDisplay');
        const gearElem = document.getElementById('gearDisplay');
        const lapElem = document.getElementById('lapDisplay');
        const scoreElem = document.getElementById('scoreDisplay');
        const statusElem = document.getElementById('raceStatus');
        const boostFillElem = document.getElementById('boostFill');
        
        function updateUI() {
            speedElem.innerText = Math.floor(speed);
            rpmElem.innerText = Math.floor(rpm / 1000);
            gearElem.innerText = gear;
            lapElem.innerText = `${currentLap}/3`;
            scoreElem.innerText = Math.floor(score);
            boostFillElem.style.width = `${boostAmount}%`;
            if (boostAmount < 25) boostFillElem.style.background = "linear-gradient(90deg, #ff8844, #ff4400)";
            else boostFillElem.style.background = "linear-gradient(90deg, #00ff88, #00ccff)";
        }
        
        // Physics & Game Logic
        function updatePhysics(deltaTime) {
            if (!gameActive) return;
            
            let boostFactor = 1.0;
            if (boosting && boostAmount > 5) {
                boostFactor = 1.48;
                boostAmount -= deltaTime * 22;
                if (boostAmount < 0) boostAmount = 0;
            } else {
                boosting = false;
                boostAmount += deltaTime * 7;
                if (boostAmount > 100) boostAmount = 100;
            }
            
            let perf = 1 + (score / 750);
            perf = Math.min(perf, 1.4);
            let rawTarget = 130 + (score / 12);
            rawTarget = Math.min(rawTarget, 355);
            targetSpeed = rawTarget * perf * boostFactor;
            
            let accel = (targetSpeed - speed) * 0.075;
            speed += accel;
            speed = Math.max(80, Math.min(speed, 378));
            
            // Gear logic
            let newGear = gear;
            if (speed > 215 && gear < 5) newGear = 5;
            else if (speed > 155 && gear < 4) newGear = 4;
            else if (speed > 105 && gear < 3) newGear = 3;
            else if (speed > 65 && gear < 2) newGear = 2;
            else if (speed < 58 && gear > 2) newGear = 2;
            if (newGear !== gear) {
                gear = newGear;
                rpm = 5400;
            }
            rpm = Math.min(12800, rpm + (speed * 28 * deltaTime));
            if (rpm > 11800) rpm = 10800;
            
            // Lap progression
            let deltaZ = speed * deltaTime * 0.052;
            lapDistance += deltaZ;
            if (lapDistance >= lapLength) {
                lapDistance -= lapLength;
                currentLap++;
                if (currentLap >= 3) {
                    gameActive = false;
                    gameWin = true;
                    statusElem.innerText = "🏆 WORLD CHAMPION! YOU WIN! 🏆";
                } else {
                    score += 200;
                    statusElem.innerText = `✅ LAP ${currentLap} COMPLETE! +200 PTS`;
                    setTimeout(() => { if(gameActive) statusElem.innerText = "🏁 PUSH FOR OVERTAKES 🏁"; }, 1800);
                }
                updateUI();
            }
        }
        
        // Opponent movement, overtake & collision
        function updateOpponents(deltaTime) {
            const playerZ = lapDistance;
            const playerX = currentLaneX;
            
            for (let i = 0; i < opponents.length; i++) {
                const opp = opponents[i];
                let oppSpeedFactor = 0.85 + (score / 1000);
                oppSpeedFactor = Math.min(oppSpeedFactor, 1.35);
                const moveDist = speed * deltaTime * 0.045 * (0.78 + opp.baseSpeed * 0.12);
                opp.z += moveDist;
                
                // Reposition if too far
                if (opp.z > playerZ + 18) {
                    opp.z = playerZ - 22 - Math.random() * 10;
                    opp.x = (Math.random() - 0.5) * 3.6;
                    opp.passed = false;
                    opp.obj.position.set(opp.x, 0.1, opp.z);
                } else if (opp.z < playerZ - 28) {
                    opp.z = playerZ + 15;
                    opp.x = (Math.random() - 0.5) * 3.6;
                    opp.passed = false;
                    opp.obj.position.set(opp.x, 0.1, opp.z);
                }
                
                opp.obj.position.set(opp.x, 0.1, opp.z);
                if (oppLabels[i]) oppLabels[i].position.set(opp.x, 0.95, opp.z);
                
                // Collision detection
                const dx = playerX - opp.x;
                const dz = playerZ - opp.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if (dist < 0.95 && gameActive) {
                    gameActive = false;
                    gameWin = false;
                    statusElem.innerText = "💥 CRASH! GAME OVER. PRESS RESTART 💥";
                }
                
                // Overtake
                if (!opp.passed && opp.z < playerZ - 0.9 && opp.z > playerZ - 4.0 && Math.abs(dx) < 1.3) {
                    opp.passed = true;
                    if (gameActive) {
                        score += 48;
                        updateUI();
                        statusElem.innerText = "🏁 OVERTAKE! +48 PTS 🏁";
                        setTimeout(() => { if(gameActive) statusElem.innerText = "🔥 KEEP RACING 🔥"; }, 900);
                    }
                }
            }
        }
        
        // Animate road dashes
        let dashOffset = 0;
        function animateRoad(deltaTime) {
            dashOffset += speed * deltaTime * 0.14;
            dashes.forEach((dash, idx) => {
                let newZ = (idx * 1.6 - trackLength/2 + dashOffset) % trackLength;
                if (newZ > trackLength/2) newZ -= trackLength;
                dash.position.z = newZ;
            });
        }
        
        // Update car position AND CHASE CAMERA
        function updateCarAndCamera(deltaTime) {
            // Smooth lane change
            currentLaneX += (targetLaneX - currentLaneX) * 0.28;
            currentLaneX = Math.min(maxLane, Math.max(-maxLane, currentLaneX));
            carGroup.position.x = currentLaneX;
            carGroup.position.z = lapDistance;
            
            // Tilt and lean based on steering
            carGroup.rotation.z = currentLaneX * 0.11;
            carGroup.rotation.x = Math.sin(Date.now() * 0.018) * 0.02;
            
            // --- CHASE CAMERA: follows car perfectly with dynamic offset ---
            // Desired camera position: behind the car, slightly above, with speed-dependent distance
            let dynamicDistance = 5.0 + (speed / 380) * 1.5;
            let dynamicHeight = 1.6 + (speed / 380) * 0.6;
            const desiredOffset = new THREE.Vector3(
                currentLaneX * 0.25,  // subtle lateral follow
                dynamicHeight,
                -dynamicDistance
            );
            
            // Smooth camera movement
            cameraOffset.lerp(desiredOffset, 0.12);
            
            // Target camera position = car position + offset
            const targetCamPos = new THREE.Vector3(
                carGroup.position.x + cameraOffset.x,
                carGroup.position.y + cameraOffset.y,
                carGroup.position.z + cameraOffset.z
            );
            
            camera.position.lerp(targetCamPos, 0.15);
            camera.lookAt(carGroup.position);
        }
        
        // Starfield
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1200;
        const starPos = [];
        for (let i = 0; i < starCount; i++) {
            starPos.push((Math.random() - 0.5) * 500);
            starPos.push((Math.random() - 0.5) * 200);
            starPos.push((Math.random() - 0.5) * 150 - 80);
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 }));
        scene.add(stars);
        
        // Controls
        function moveLeft() { if (gameActive) targetLaneX = Math.max(-maxLane, targetLaneX - laneStep); }
        function moveRight() { if (gameActive) targetLaneX = Math.min(maxLane, targetLaneX + laneStep); }
        function useBoost() {
            if (!gameActive) return;
            if (boostAmount >= 15) {
                boosting = true;
                statusElem.innerText = "⚡ ERS BOOST ACTIVE! ⚡";
                setTimeout(() => { if(gameActive && boosting) statusElem.innerText = "🏎️ PUSH LIMITS 🏎️"; }, 800);
            } else {
                statusElem.innerText = "⚠️ BOOST LOW! WAIT ⚠️";
            }
        }
        function restartGame() {
            gameActive = true;
            gameWin = false;
            speed = 125;
            targetSpeed = 125;
            score = 0;
            currentLap = 0;
            lapDistance = 0;
            boostAmount = 100;
            boosting = false;
            targetLaneX = 0;
            currentLaneX = 0;
            gear = 2;
            rpm = 5200;
            
            opponents.forEach((opp, idx) => {
                opp.z = -18 - idx * 8;
                opp.x = (Math.random() - 0.5) * 3.4;
                opp.passed = false;
                opp.obj.position.set(opp.x, 0.1, opp.z);
                if (oppLabels[idx]) oppLabels[idx].position.set(opp.x, 0.95, opp.z);
            });
            updateUI();
            statusElem.innerText = "🏁 RACE RESTARTED! 3 LAPS TO WIN 🏁";
            cameraOffset.set(0, 1.8, -5.2);
        }
        
        // Event Listeners
        document.getElementById('leftBtn').addEventListener('click', (e) => { e.preventDefault(); moveLeft(); });
        document.getElementById('rightBtn').addEventListener('click', (e) => { e.preventDefault(); moveRight(); });
        document.getElementById('boostBtn').addEventListener('click', (e) => { e.preventDefault(); useBoost(); });
        document.getElementById('restartBtn').addEventListener('click', (e) => { e.preventDefault(); restartGame(); });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
            if (e.key === ' ' || e.key === 'Shift') { e.preventDefault(); useBoost(); }
            if (e.key === 'r') restartGame();
        });
        
        // Animation Loop
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let dt = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            if (dt < 0.008) dt = 0.016;
            
            if (gameActive) {
                updatePhysics(dt);
                updateOpponents(dt);
                animateRoad(dt);
                updateCarAndCamera(dt);
                updateUI();
            } else {
                // subtle idle rotation when crashed/win
                carGroup.rotation.z += 0.008;
            }
            
            // Animate sun
            sunLight.position.x = 5 + Math.sin(Date.now() * 0.0004) * 1.2;
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        restartGame();
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
